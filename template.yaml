AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: MSA Coffee Hands-on - Full Architecture

Globals:
  Function:
    Timeout: 10
    Runtime: nodejs20.x
    MemorySize: 128

Resources:
  # ============================================================
  #  Lambda — 마이크로서비스
  # ============================================================

  CatalogFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/catalog-service/
      Handler: index.handler
      Environment:
        Variables:
          CATALOG_TABLE: !Ref CatalogTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref CatalogTable
      Events:
        GetCategories:
          Type: Api
          Properties:
            Path: /api/catalog/categories
            Method: get
        GetItems:
          Type: Api
          Properties:
            Path: /api/catalog/items
            Method: get
        GetItem:
          Type: Api
          Properties:
            Path: /api/catalog/items/{id}
            Method: get
        GetOptions:
          Type: Api
          Properties:
            Path: /api/catalog/options
            Method: get

  OrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/order-service/
      Handler: index.handler
      Environment:
        Variables:
          ORDER_TABLE: !Ref OrderTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrderTable
      Events:
        CreateOrder:
          Type: Api
          Properties:
            Path: /api/orders
            Method: post
        GetOrder:
          Type: Api
          Properties:
            Path: /api/orders/{orderId}
            Method: get

  # ============================================================
  #  DynamoDB — 데이터 저장
  # ============================================================

  CatalogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  OrderTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH

  # ============================================================
  #  S3 — 프론트엔드 정적 호스팅
  # ============================================================

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ============================================================
  #  CloudFront — CDN + 프론트/API 통합 진입점
  # ============================================================

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !Ref CloudFrontOAC
          - Id: ApiOrigin
            DomainName: !Sub "${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
            OriginPath: /Prod
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

Outputs:
  CloudFrontUrl:
    Description: CloudFront URL (프론트엔드 + API 통합)
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
  ApiUrl:
    Description: API Gateway URL (API 직접 접근)
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  FrontendBucket:
    Description: S3 Bucket (프론트엔드 업로드용)
    Value: !Ref FrontendBucket
  CatalogTableName:
    Description: DynamoDB Table (카탈로그 데이터)
    Value: !Ref CatalogTable
  OrderTableName:
    Description: DynamoDB Table (주문 데이터)
    Value: !Ref OrderTable
